name: test

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
            role-to-assume: ${{ secrets.aws_github_action_role_arn}}
            aws-region: ${{ vars.aws_region }}
        
      - name: Upload files to S3
        run: aws s3 sync test/k6/report/demo.html s3://eks-benchmark.arguswatcher.net/report --delete

  notify-slack:
    runs-on: ubuntu-latest
    if: always()
    steps:
    - uses: actions/checkout@v4
    - name: Send Slack Notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_MESSAGE: "GitHub Action job status: ${{ job.status }}"
        SLACK_COLOR: ${{ job.status }} 
        SLACK_CHANNEL: '#github-actions'