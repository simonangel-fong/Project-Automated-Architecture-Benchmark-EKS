# .github/workflows/job_deploy.yaml
name: Job-Deploy Resources

on:
    workflow_call:
        inputs:
            project:
                description: "Project name"
                required: true
                type: string
            arch:
                description: "Architecture"
                required: true
                type: string
            aws_region:
                description: "AWS region"
                type: string
                default: "ca-central-1"
            test_version:
                description: "Test version"
                type: string
                default: "0.1"
        secrets:
            db_name:
                description: "Database name"
            db_username:
                description: "Database username"
            db_password:
                description: "Database password"
            db_app_pwd:
                description: "App user password"
            db_readonly_pwd:
                description: "Readonly user password"
            cf_api_token:
                description: "Cloudflare API token"
            cf_zone_id:
                description: "Cloudflare zone id"
            aws_github_action_role_arn:
                description: "AWS role for github actions"
            aws_backend_bucket:
                description: "AWS bucket for tf remote backend"
            cluster_admin_arn:
                description: "AWS arn for EKS cluster admin"
            slack_webhook_url:
                description: "Slack webhook url"

jobs:
    deploy_infra:
        name: AWS ${{ inputs.arch }}
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            TF_VERSION: 1.14.0
            TF_DIR: infra/${{ inputs.arch }}
            TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache
            TF_VAR_aws_region: ${{ inputs.AWS_REGION }}
            TF_VAR_env: ${{ inputs.arch }}
            TF_VAR_db_name: ${{ secrets.db_name }}
            TF_VAR_db_username: ${{ secrets.db_username }}
            TF_VAR_db_password: ${{ secrets.db_password }}
            TF_VAR_db_app_pwd: ${{ secrets.db_app_pwd }}
            TF_VAR_db_readonly_pwd: ${{ secrets.db_readonly_pwd }}
            TF_VAR_cloudflare_api_token: ${{ secrets.cf_api_token }}
            TF_VAR_cloudflare_zone_id: ${{ secrets.cf_zone_id }}
            TF_VAR_cluster_admin_arn: ${{ secrets.cluster_admin_arn }}
            TF_VAR_github_cicd_role_arn: ${{ secrets.aws_github_action_role_arn }}
            TF_VAR_test_version: ${{ inputs.test_version }}
        outputs:
            vpc_id: ${{ steps.tf-outputs.outputs.vpc_id }}
            cluster_name: ${{ steps.tf-outputs.outputs.cluster_name }}
            cluster_endpoint: ${{ steps.tf-outputs.outputs.cluster_endpoint }}
            queue_name: ${{ steps.tf-outputs.outputs.queue_name }}
            iam_role_lbc: ${{ steps.tf-outputs.outputs.lbc_arn }}
            iam_role_eso: ${{ steps.tf-outputs.outputs.eso_arn }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: ${{ env.TF_VERSION }}

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.aws_github_action_role_arn}}
                  aws-region: ${{ inputs.aws_region }}

            - name: Configure Terraform plugin cache
              run: |
                  mkdir -pv ${{ env.TF_PLUGIN_CACHE_DIR }}
                  echo 'plugin_cache_dir = "${{ env.TF_PLUGIN_CACHE_DIR }}"' > ~/.terraformrc

            - name: Cache Terraform plugins
              uses: actions/cache@v4
              with:
                  path: ${{ env.TF_PLUGIN_CACHE_DIR }}
                  key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ inputs.arch }}-${{ hashFiles('aws/.terraform.lock.hcl') }}

            - name: Terraform init - S3 backend
              working-directory: ${{ env.TF_DIR }}
              run: |
                  terraform init -reconfigure -input=false \
                    -backend-config="bucket=${{ secrets.AWS_BACKEND_BUCKET }}" \
                    -backend-config="region=${{ inputs.AWS_REGION }}" \
                    -backend-config="key=${{ inputs.project }}/${{ inputs.arch }}/terraform.tfstate" \
                    -backend-config="encrypt=true"

            - name: Terraform Validate
              working-directory: ${{ env.TF_DIR }}
              run: |
                  terraform fmt -check -recursive -no-color
                  terraform validate -no-color

            - name: Deploy - Terraform Plan
              working-directory: ${{ env.TF_DIR }}
              id: deploy-plan
              run: terraform plan -out=tfplan -input=false -no-color

            - name: Deploy - Show plan (JSON)
              working-directory: ${{ env.TF_DIR }}
              run: terraform show -json tfplan > tfplan.json

            - name: Deploy - Save plan artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: "tfplan-deploy-${{ env.TF_VAR_env }}"
                  path: |
                      ${{ env.TF_DIR }}/tfplan
                      ${{ env.TF_DIR }}/tfplan.json
                  overwrite: true
                  retention-days: 3

            - name: Deploy - Terraform Apply
              working-directory: ${{ env.TF_DIR }}
              run: terraform apply -auto-approve -no-color tfplan

            - name: Export Terraform Outputs
              id: tf-outputs
              working-directory: ${{ env.TF_DIR }}
              run: |
                  echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_OUTPUT
                  echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
                  echo "CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
                  echo "QUEUE_NAME=$(terraform output -raw queue_name)" >> $GITHUB_OUTPUT
                  
                  echo "LBC_ARN=$(terraform output -raw iam_role_lbc)" >> $GITHUB_OUTPUT
                  echo "ESO_ARN=$(terraform output -raw iam_role_eso)" >> $GITHUB_OUTPUT

            - name: Notify Slack
              if: always()
              uses: slackapi/slack-github-action@v2.1.1
              with:
                webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                webhook-type: incoming-webhook
                payload: |
                    text: >
                    ${{ job.status == 'success' && '✅' || job.status == 'failure' && '❌' || '⚠️' }}
                    *${{ github.workflow }}* / *${{ github.job }}*
                    ended with *${{ job.status }}*.

                    *Repo:* ${{ github.repository }}
                    *Branch:* ${{ github.ref_name }}
                    *Actor:* ${{ github.actor }}
                    *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    deploy_k8s:
        name: K8s ${{ inputs.arch }}
        needs:
            - deploy_infra
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: read
            id-token: write # Required for OIDC authentication
        env:
            ARCH: ${{ inputs.arch }}
            REGION: ${{ inputs.aws_region }}

            VPC_ID: ${{ needs.deploy_infra.outputs.vpc_id }}
            CLUSTER_NAME: ${{ needs.deploy_infra.outputs.cluster_name }}
            CLUSTER_ENDPOINT: ${{ needs.deploy_infra.outputs.cluster_endpoint }}
            QUEUE_NAME: ${{ needs.deploy_infra.outputs.queue_name }}

            IAM_LBC_ROLE_ARN: ${{ needs.deploy_infra.outputs.iam_role_lbc }}
            IAM_ESO_ROLE_ARN: ${{ needs.deploy_infra.outputs.iam_role_eso }}
            CF_TOKEN: ${{ secrets.cf_api_token }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.aws_github_action_role_arn}}
                  aws-region: ${{ inputs.aws_region }}

            - name: Set up kubectl
              uses: azure/setup-kubectl@v3
              with:
                  version: "v1.34.0"

            - name: Update kubeconfig
              run: |
                  echo "${{ inputs.project }}-${{ inputs.arch }}"
                  aws eks update-kubeconfig --name "${{ inputs.project }}-${{ inputs.arch }}" --region ${{ inputs.aws_region }}

            - name: Install Helm
              uses: azure/setup-helm@v4.3.0

            - name: Deploy Add-ons
              run: |
                  bash manifest/script/01_init_add_on.sh

            - name: Deploy backend
              run: |
                  bash manifest/script/02_init_deploy_backend.sh

            - name: Notify Slack
              if: always()
              uses: slackapi/slack-github-action@v2.1.1
              with:
                webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                webhook-type: incoming-webhook
                payload: |
                    text: >
                    ${{ job.status == 'success' && '✅' || job.status == 'failure' && '❌' || '⚠️' }}
                    *${{ github.workflow }}* / *${{ github.job }}*
                    ended with *${{ job.status }}*.

                    *Repo:* ${{ github.repository }}
                    *Branch:* ${{ github.ref_name }}
                    *Actor:* ${{ github.actor }}
                    *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}