# karpenter.yaml
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: general-node-class
  namespace: backend
spec:
  # match node_iam_role_name in karpenter
  role: "eks-benchmark-kafka" 
  # Specify AMI
  amiSelectorTerms:
    - alias: bottlerocket@latest
  # Specify subnet: match vpc subnet tag
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "eks-benchmark-kafka" 
  # Specify subnet: match security group
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "eks-benchmark-kafka" 
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-node-pool
  namespace: backend
spec:
  template:
    spec:
      expireAfter: 720h # 30 * 24h = 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: general-node-class
      requirements:
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["c6i.xlarge"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]

  limits:
    cpu: 1000
  
  disruption:
    consolidationPolicy: WhenEmpty  # delete nodes when they become empty.
    consolidateAfter: 30s
