# app_fastapi.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: msk-redis-outbox
  namespace: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::099139718958:role/eks-benchmark-kafka-msk-redis-outbox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-outbox
  namespace: backend
  labels:
    app.kubernetes.io/name: redis-outbox
    app.kubernetes.io/part-of: eks-benchmark
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-outbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-outbox
        app.kubernetes.io/part-of: eks-benchmark
        app.kubernetes.io/component: worker
      annotations:
        kubernetes.io/change-cause: "redis-outbox deploy"
    spec:
      serviceAccountName: msk-redis-outbox
      terminationGracePeriodSeconds: 90
      containers:
        - name: redis-outbox
          image: 099139718958.dkr.ecr.ca-central-1.amazonaws.com/auto-benchmark:redis-outbox
          imagePullPolicy: Always

          env:
            - name: POSTGRES__HOST
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: POSTGRES__HOST
            - name: POSTGRES__PORT
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: POSTGRES__PORT
            - name: POSTGRES__DB
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: POSTGRES__DB
            - name: POSTGRES__USER
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: POSTGRES__USER
            - name: POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: POSTGRES__PASSWORD
            - name: REDIS__HOST
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: REDIS__HOST
            - name: REDIS__PORT
              valueFrom:
                secretKeyRef:
                  name: app-cred
                  key: REDIS__PORT

          resources:
            requests:
              cpu: "512m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "512Mi"
